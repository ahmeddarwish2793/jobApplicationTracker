<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>

  <link rel="stylesheet" href="../css/registerScene.css" />
  <link rel="stylesheet" href="../css/bootstrap.min.css" />
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>

<body>

  <main class="auth-page">
    <section class="auth-card">

      <div class="auth-icon">🎒</div>

      <h1 class="auth-title">Create an account</h1>
      <p class="auth-subtitle">Sign up to start tracking your job applications</p>

      <form class="auth-form" id="registerForm">

        <label class="auth-label" for="fullName">Full Name</label>
        <input class="auth-input" id="fullName" type="text" placeholder="Your name" />
        <small id="name-error" class="error-message"></small>

        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" id="email" type="email" placeholder="you@example.com" />
        <small id="email-error" class="error-message"></small>

        <label class="auth-label" for="password">Password</label>

    <div class="password-container">
     <input
       class="auth-input"
       id="password"
       type="password"
       placeholder="••••••••"
       />
        <i
       class="fa-solid fa-eye-slash toggle-password"
       id="togglePassword"
     ></i>
    </div>
<small id="password-error" class="error-message"></small>

<label class="auth-label" for="confirmPassword">Confirm Password</label>

  <div class="password-container">
   <input
      class="auth-input"
      id="confirmPassword"
      type="password"
       placeholder="••••••••"
     />

    <i
      class="fa-solid fa-eye-slash toggle-password"
      id="toggleConfirmPassword"
    ></i>
  </div>

<small id="confirm-password-error" class="error-message"></small>

        <button class="auth-button" type="submit">
          Sign Up
        </button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a class="auth-link" href="./login.html">Sign in</a>
      </p>

    </section>
  </main>
  <script src="../js/registerScene.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Job Applications Tracker</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body class="center-page">
    <div class="card login-card">
      <div class="login-logo">
        <i class="fa-solid fa-briefcase"></i>
      </div>

      <h2 class="login-title text-center">Welcome back</h2>
      <p class="login-subtitle text-center">
        Sign in to your account to continue
      </p>

      <form>
        <label>Email</label>
        <input type="email" class="input-field" placeholder="you@example.com" />
        <small class="error-message" id="emailError"></small>

        <div class="password-row">
          <label>Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <div class="password-container">
          <input
            type="password"
            id="passwordInput"
            class="input-field"
            placeholder="••••••••"
          />
          <i class="fa-solid fa-eye-slash toggle-password" id="togglePassword"></i>
        </div>
        <small class="error-message" id="passwordError"></small>

        <button type="submit" class="button-primary">Sign In</button>

        <p class="signup-text">
          Don't have an account?
          <a href="registerScene.html" class="signup-link">Sign up</a>
        </p>
      </form>
    </div>

    <!-- Reset Password Modal -->
    <div class="modal-overlay" id="resetModal">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Reset Password</h3>
          <span class="close-modal" id="closeModal">&times;</span>
        </div>

        <p class="modal-description">
          Enter your email address and we'll send you a link to reset your
          password.
        </p>

        <label>Email</label>
        <input type="email" id="emailModal" class="input-field" placeholder="you@example.com" />
        <small id="email-error" class="error-message"></small>

        <button class="button-primary">Send Reset Link</button>
      </div>
    </div>
    <script src="../js/auth.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
	      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<link rel="stylesheet" href="../css/profile.css">
	<link rel="stylesheet" href="../css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
	
	<title>Profile</title>
</head>


<body>

<div class="top-bar py-3 border-bottom">
	
	<div class="container-fluid">
		<div class="row justify-content-center">
			
			<div class="col-md-6">
				
				<a href="main.html" class="back-btn text-decoration-none text-dark align-items-center gap-2 small">
					<i class="fa-solid fa-arrow-left"></i>
					Back to Dashboard
				</a>
			
			</div>
		
		</div>
	</div>

</div>


<div class="page-wrapper">
	
	<div class="container-fluid">
		
		<div class="row justify-content-center">
			
			<div class="col-md-6 profile-container">
				
				<div class="profile-card bg-white p-4 rounded-4 mt-1 mb-5">
					
					<h4 class="fw-bold">Profile Settings</h4>
					
					<p class="text-muted mb-4">
						Manage your account information
					</p>
					
					
					<div class="avatar-section text-center mb-4">
						
						<div class="avatar-circle mx-auto">
							
							<img id="profileImage" src="" alt="" style="display:none;">
							
							<span id="avatarLetters">
                                ZA
                            </span>
						
						</div>
						
						
						<input type="file" id="photoInput" accept="image/*" hidden>
						
						
						<button class="btn btn-light border mt-3" id="changePhotoBtn">
							
							<i class="fa-solid fa-camera"></i>
							
							Change Photo
						
						</button>
					
					</div>
					
					
					<div id="imageEditor" style="display:none; margin-top:20px;">
						
						<img id="imageToCrop" style="max-width:100%;">
						
						<button class="btn btn-dark mt-3" id="cropBtn">
							Save Photo
						</button>
					
					</div>
					
					
					<hr class="my-4">
					
					
					<div class="mb-3">
						
						<label class="form-label fw-semibold">
							Full Name
						</label>
						
						<input
								type="text"
								class="form-control form-control-lg"
								value="Zeyad Aly"
								placeholder="your name">
					
					</div>
					
					
					<div class="mb-3">
						
						<label class="form-label fw-semibold">
							Email
						</label>
						
						<input
								type="email"
								class="form-control form-control-lg"
								value="Zeyadessam1602@gmail.com"
								disabled>
						
						<small class="text-muted">
							Email cannot be changed
						</small>
					
					</div>
					
					
					<button id="updateProfileBtn" class="btn update-btn w-100 mt-3">
						Update Profile
					</button>
					
					
					<hr class="my-4">
					
					
					<button
							class="btn reset-btn w-100"
							data-bs-toggle="modal"
							data-bs-target="#resetPasswordModal">
						
						<i class="fa-solid fa-lock me-2"></i>
						
						Reset Password
					
					</button>
				
				</div>
			
			</div>
		
		</div>
	
	</div>

</div>


<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
	
	<div
			id="successToast"
			class="toast align-items-center text-bg-light border shadow"
			role="alert">
		
		<div class="d-flex">
			
			<div class="toast-body d-flex align-items-center gap-2">
				
				<i class="fa-solid fa-circle-check text-success"></i>
				
				Profile updated successfully
			
			</div>
			
			<button
					type="button"
					class="btn-close me-2 m-auto"
					data-bs-dismiss="toast">
			</button>
		
		</div>
	
	</div>

</div>



<div class="modal fade" id="resetPasswordModal" tabindex="-1">
	
	<div class="modal-dialog modal-dialog-centered">
		
		<div class="modal-content p-3">
			
			
			<div class="modal-header border-0">
				
				<h5 class="modal-title">
					Change Password
				</h5>
				
				<button
						type="button"
						class="btn-close"
						data-bs-dismiss="modal">
				</button>
			
			</div>
			
			
			<div class="modal-body">
				
				
				<div class="mb-3">
					
					<label class="form-label">
						Old Password
					</label>
					
					<input
							type="password"
							id="oldPassword"
							class="form-control form-control-lg">
				
				</div>
				
				
				<div class="mb-3">
					
					<label class="form-label">
						New Password
					</label>
					
					<input
							type="password"
							id="newPassword"
							class="form-control form-control-lg">
				
				</div>
				
				
				<div class="mb-3">
					
					<label class="form-label">
						Confirm New Password
					</label>
					
					<input
							type="password"
							id="confirmPassword"
							class="form-control form-control-lg">
				
				</div>
				
				
				<button
						id="changePasswordBtn"
						class="btn update-btn w-100 mt-3">
					
					Change Password
				
				</button>
				
				
				<small id="passwordError" class="text-danger"></small>
			
			</div>
		
		</div>
	
	</div>

</div>



<div class="position-fixed bottom-0 end-0 p-3" style="z-index:11">
	
	<div class="toast align-items-center text-bg-light border shadow" id="passwordToast">
		
		<div class="d-flex">
			
			<div class="toast-body d-flex align-items-center gap-2">
				
				<i class="fa-solid fa-circle-check text-success"></i>
				
				Password updated successfully
			
			</div>
			
			<button
					class="btn-close me-2 m-auto"
					data-bs-dismiss="toast">
			</button>
		
		</div>
	
	</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
<script src="../js/profile.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>

</body>
</html>
